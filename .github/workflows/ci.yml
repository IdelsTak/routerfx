name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit and Contract Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '26'
          cache: maven

      - name: Run unit tests
        run: mvn -B -ntp -Punit-tests test

      - name: Upload unit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            target/surefire-reports/**
          if-no-files-found: ignore

  ui-tests:
    name: TestFX UI Tests (Non-Headless)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '26'
          cache: maven

      - name: Run TestFX UI tests with display session
        run: xvfb-run --auto-servernum --server-args='-screen 0 1920x1080x24' mvn -B -ntp -Pui-tests test

      - name: Upload UI reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-reports
          path: |
            target/surefire-reports/**
            target/testfx-reports/**
          if-no-files-found: ignore

  coverage:
    name: Coverage (JaCoCo)
    runs-on: ubuntu-latest
    needs:
      - unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '26'
          cache: maven

      - name: Run verification with JaCoCo
        run: mvn -B -ntp -Punit-tests verify

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: |
            target/site/jacoco/**
            target/jacoco.exec
          if-no-files-found: ignore
