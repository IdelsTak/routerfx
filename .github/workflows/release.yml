name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    name: Build and Publish Release Artifact
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '26'
          cache: maven

      - name: Resolve PR merge context
        id: pr-context
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          API="https://api.github.com/repos/${REPO}/commits/${SHA}/pulls"
          PRS_JSON="$(curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "$API")"
          MERGED_AT="$(echo "$PRS_JSON" | jq -r '.[0].merged_at // empty')"
          if [[ -z "$MERGED_AT" ]]; then
            echo "merged=false" >> "$GITHUB_OUTPUT"
            echo "No merged PR found for $SHA, skipping release steps"
            exit 0
          fi
          echo "merged=true" >> "$GITHUB_OUTPUT"

      - name: Resolve semver bump type from PR labels
        id: bump-type
        if: steps.pr-context.outputs.merged == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          API="https://api.github.com/repos/${REPO}/commits/${SHA}/pulls"
          PRS_JSON="$(curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "$API")"
          TITLE="$(echo "$PRS_JSON" | jq -r '.[0].title // empty')"
          BODY="$(echo "$PRS_JSON" | jq -r '.[0].body // empty')"
          LABELS="$(echo "$PRS_JSON" | jq -r '.[0].labels[]?.name' || true)"
          BUMP="patch"
          if echo "$LABELS" | grep -qw 'version:major'; then
            BUMP="major"
          elif echo "$LABELS" | grep -qw 'version:minor'; then
            BUMP="minor"
          elif echo "$LABELS" | grep -qw 'version:patch'; then
            BUMP="patch"
          fi
          if [[ -z "$TITLE" ]]; then
            TITLE="${{ github.event.workflow_run.head_commit.message }}"
          fi
          if [[ -z "$BODY" ]]; then
            BODY="Release created from commit $SHA"
          fi
          echo "type=$BUMP" >> "$GITHUB_OUTPUT"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          {
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Bump pom.xml version and create release tag
        id: bump
        if: steps.pr-context.outputs.merged == 'true'
        env:
          BUMP_TYPE: ${{ steps.bump-type.outputs.type }}
        run: |
          set -euo pipefail
          CURRENT="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)"
          BASE="${CURRENT%-SNAPSHOT}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
          if [[ -z "$MAJOR" || -z "$MINOR" || -z "$PATCH" ]]; then
            echo "Unsupported semver format: $BASE"
            exit 1
          fi
          case "$BUMP_TYPE" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch|*)
              PATCH=$((PATCH + 1))
              ;;
          esac
          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          mvn -B -ntp versions:set -DnewVersion="$NEXT" -DgenerateBackupPoms=false
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pom.xml
          if git diff --cached --quiet; then
            echo "No version bump changes detected"
            echo "version=$NEXT" >> "$GITHUB_OUTPUT"
            echo "tag=v$NEXT" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Bump version to $NEXT"
          git tag "v$NEXT"
          git push origin HEAD:main --follow-tags
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEXT" >> "$GITHUB_OUTPUT"

      - name: Package application
        if: steps.pr-context.outputs.merged == 'true'
        run: mvn -B -ntp -DskipTests package

      - name: Create checksums
        if: steps.pr-context.outputs.merged == 'true'
        run: sha256sum target/*.jar > target/sha256sums.txt

      - name: Generate changelog file
        if: steps.pr-context.outputs.merged == 'true'
        run: |
          echo "# Changelog" > changelog.md
          echo "" >> changelog.md
          echo "## ${{ steps.bump-type.outputs.title }}" >> changelog.md
          echo "" >> changelog.md
          echo "${{ steps.bump-type.outputs.body }}" >> changelog.md

      - name: Publish GitHub release
        if: steps.pr-context.outputs.merged == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: ${{ steps.bump.outputs.tag }}
          body_path: changelog.md
          files: |
            target/*.jar
            target/sha256sums.txt
            changelog.md
