name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Publish Release Artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '26'
          cache: maven

      - name: Resolve semver bump type from PR labels
        id: bump-type
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          API="https://api.github.com/repos/${REPO}/commits/${SHA}/pulls"
          PRS_JSON="$(curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "$API")"
          PR_TITLE="$(echo "$PRS_JSON" | jq -r '.[0].title // empty')"
          PR_BODY="$(echo "$PRS_JSON" | jq -r '.[0].body // empty')"
          LABELS="$(echo "$PRS_JSON" | jq -r '.[0].labels[]?.name' || true)"
          BUMP="patch"
          if echo "$LABELS" | grep -qx 'version:major'; then
            BUMP="major"
          elif echo "$LABELS" | grep -qx 'version:minor'; then
            BUMP="minor"
          elif echo "$LABELS" | grep -qx 'version:patch'; then
            BUMP="patch"
          fi
          if [[ -z "$PR_TITLE" ]]; then
            PR_TITLE="${{ github.event.workflow_run.head_commit.message }}"
          fi
          if [[ -z "$PR_BODY" ]]; then
            PR_BODY="Release created from commit $SHA"
          fi
          echo "type=$BUMP" >> "$GITHUB_OUTPUT"
          echo "title=$PR_TITLE" >> "$GITHUB_OUTPUT"
          {
            echo "body<<EOF"
            echo "$PR_BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Bump pom.xml version and create release tag
        id: bump
        env:
          BUMP_TYPE: ${{ steps.bump-type.outputs.type }}
        run: |
          set -euo pipefail
          CURRENT="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)"
          BASE="${CURRENT%-SNAPSHOT}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
          if [[ -z "$MAJOR" || -z "$MINOR" || -z "$PATCH" ]]; then
            echo "Unsupported semver format: $BASE"
            exit 1
          fi
          case "$BUMP_TYPE" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch|*)
              PATCH=$((PATCH + 1))
              ;;
          esac
          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          mvn -B -ntp versions:set -DnewVersion="$NEXT" -DgenerateBackupPoms=false
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pom.xml
          if git diff --cached --quiet; then
            echo "No version bump changes detected"
            echo "version=$NEXT" >> "$GITHUB_OUTPUT"
            echo "tag=v$NEXT" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Bump version to $NEXT"
          git tag "v$NEXT"
          git push origin HEAD:main --follow-tags
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEXT" >> "$GITHUB_OUTPUT"

      - name: Package application
        run: mvn -B -ntp -DskipTests package

      - name: Create checksums
        run: |
          sha256sum target/*.jar > target/sha256sums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: ${{ steps.bump-type.outputs.title }}
          body: ${{ steps.bump-type.outputs.body }}
          files: |
            target/*.jar
            target/sha256sums.txt
